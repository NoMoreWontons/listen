<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>listen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --stone:      #EDE9DE; /* page ground, warm cardboard */
    --panel:      #2B2A28; /* transport console, brushed-graphite chassis */
    --panel-edge: #444038; /* console bevel highlight */
    --lcd:        #F3EEE2; /* cream readout window */
    --ink:        #2B2A28;
    --ink-soft:   #837c6c;
    --ink-on-panel: #C9C4B6;
    --rec:        #D9432F; /* transport REC lamp */
    --live:       #3FA78C; /* signal LED, "hearing audio" */
    --amber:      #DE9A32; /* transcribing */
    --card:       #FBF9F3;
    --card-edge:  #E1DACB;
    --radius-panel: 18px;
    --radius-card: 10px;
    --font-display: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  body {
    font-family: system-ui, sans-serif;
    background: var(--stone);
    color: var(--ink);
    max-width: 1200px;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 4rem;
    line-height: 1.5;
  }

  .main {
    display: grid;
    grid-template-columns: 3fr 2fr;
    gap: 1.5rem;
    align-items: start;
    margin-top: 2.25rem;
  }
  @media (max-width: 800px) {
    .main { grid-template-columns: 1fr; }
  }

  .brand { margin-bottom: 1.75rem; }
  .brand h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.8rem;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .tagline {
    margin: .15rem 0 0;
    font-size: .8rem;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .deck-label {
    display: block;
    font-family: var(--font-display);
    font-size: .68rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-on-panel);
    opacity: .65;
    margin-bottom: .5rem;
  }

  /* ---- transport console ---- */
  .deck {
    background: var(--panel);
    border-radius: var(--radius-panel);
    padding: 1.4rem 1.5rem 1.6rem;
    box-shadow:
      inset 0 1px 0 var(--panel-edge),
      0 10px 24px -14px rgba(0,0,0,.55);
  }

  .deck-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .deck-group.signal { text-align: right; }

  #controls { display: flex; align-items: center; gap: 1rem; }

  /* universal click/hover feedback for every button; specific rules below still win on color */
  button { transition: transform .1s ease, filter .15s ease; }
  button:hover { filter: brightness(1.15); }
  button:active { transform: translateY(1px) scale(.98); filter: brightness(.95); }
  @media (prefers-reduced-motion: reduce) { button:active { transform: none; } }

  button#btn, button.upload-btn {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: .95rem;
    letter-spacing: .01em;
    padding: .65rem 1.3rem;
    border-radius: 999px;
    border: 1px solid #55504a;
    background: #38352f;
    color: var(--ink-on-panel);
    cursor: pointer;
    box-shadow: 0 1px 0 rgba(255,255,255,.05) inset, 0 2px 4px rgba(0,0,0,.3);
    transition: transform .12s ease, background .2s ease, box-shadow .2s ease;
  }
  button#btn:hover, button.upload-btn:hover { background: #423e37; }
  button#btn:active, button.upload-btn:active { transform: translateY(1px); }
  button#btn:focus-visible {
    outline: 2px solid var(--live);
    outline-offset: 2px;
  }

  select#micSelect {
    font-family: var(--font-mono);
    font-size: .78rem;
    background: #38352f;
    color: var(--ink-on-panel);
    border: 1px solid #55504a;
    border-radius: 6px;
    padding: .4rem .5rem;
  }
  button#btn.recording {
    background: var(--rec);
    color: #fff;
    border-color: var(--rec);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(217,67,47,.55); }
    50%      { box-shadow: 0 0 0 7px rgba(217,67,47,0); }
  }
  @media (prefers-reduced-motion: reduce) {
    button#btn.recording { animation: none; }
  }

  /* timer as a recessed LCD counter window */
  .timer {
    display: none;
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 1.05rem;
    background: var(--lcd);
    color: var(--ink);
    padding: .45rem .7rem;
    border-radius: 6px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.35);
    letter-spacing: .03em;
  }
  .timer.on { display: inline-block; }

  .mic {
    display: none;
    font-size: .82rem;
    font-family: var(--font-mono);
    color: var(--ink-on-panel);
  }
  .mic.on { display: inline; }

  /* oscilloscope panel */
  #wave {
    display: none;
    width: 100%;
    height: 84px;
    margin-top: 1.25rem;
    border-radius: 8px;
    background:
      linear-gradient(var(--panel-edge) 1px, transparent 1px) 0 50% / 100% 21px,
      #221f1c;
    box-shadow: inset 0 1px 4px rgba(0,0,0,.5);
  }
  #wave.on { display: block; }

  /* ---- sessions ---- */
  .sessions > .deck-label, .folders > .deck-label { color: var(--ink-soft); opacity: 1; margin-bottom: .75rem; }

  a.obs { color: inherit; text-decoration: underline dotted; }
  a.obs:hover { text-decoration: underline; }

  /* ---- unit merge panel ---- */
  .side { display: grid; gap: 1.5rem; align-content: start; }
  .merge-hint { margin: 0 0 .25rem; font-size: .78rem; color: var(--ink-soft); }
  .merge-sugg {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
    gap: .3rem .6rem; padding: .5rem 0; border-bottom: 1px solid #efe9db; font-size: .85rem;
  }
  .merge-sugg em { font-style: normal; font-weight: 600; }
  .merge-cls {
    font-family: var(--font-mono); font-size: .68rem;
    color: var(--ink-soft); margin-left: .45rem;
  }
  .merge-actions { display: flex; gap: .35rem; }
  .merge-sugg button, .merge-manual button {
    font-family: var(--font-display); font-weight: 600; font-size: .72rem;
    padding: .3rem .75rem; border: 1px solid var(--card-edge); border-radius: 999px;
    background: #fffdf8; color: var(--ink); cursor: pointer; white-space: nowrap;
  }
  .merge-sugg button:hover, .merge-manual button:hover { background: #f1ecdf; }
  .merge-manual { display: flex; flex-wrap: wrap; align-items: center; gap: .5rem; margin-top: .8rem; font-size: .8rem; }
  .merge-into { color: var(--ink-soft); }
  .merge-manual select {
    flex: 1; min-width: 8rem; max-width: 13rem; font-size: .8rem; padding: .3rem .4rem;
    border: 1px solid #d8d2c2; border-radius: 6px; background: #fffdf8; color: var(--ink);
  }

  /* ---- practice quizzes ---- */
  .pq-row { display: flex; justify-content: space-between; gap: .5rem; padding: .4rem 0;
    border-bottom: 1px solid #efe9db; font-size: .82rem; cursor: pointer; }
  .pq-row:hover { background: #f1ecdf; }
  .pq-score { font-family: var(--font-mono); font-size: .72rem; color: var(--ink-soft); }
  .quiz { background: var(--card); border: 1px solid var(--card-edge);
    border-radius: var(--radius-card); padding: 1rem 1.15rem; margin: 0 0 .85rem; }
  .quiz .q { margin: .8rem 0; }
  .quiz .q p { margin: 0 0 .35rem; font-weight: 600; }
  .quiz label { display: block; font-size: .88rem; padding: .15rem 0; cursor: pointer; }
  .quiz textarea { width: 100%; padding: .35rem .5rem; font-size: .82rem; font-family: inherit;
    border: 1px solid #d8d2c2; border-radius: 6px; background: #fffdf8; resize: vertical; }
  .quiz .verdict { font-size: .8rem; margin: .25rem 0 0; }
  .quiz .verdict.good { color: #226e5b; }
  .quiz .verdict.bad { color: #8f2323; }
  .quiz .quiz-head { display: flex; justify-content: space-between; align-items: baseline; }
  .quiz .quiz-head button { border: none; background: none; cursor: pointer; color: var(--ink-soft); }
  .quiz button.submit { padding: .35rem .8rem; font-size: .78rem; border: 0; border-radius: 6px;
    cursor: pointer; background: var(--amber); color: #3a2c00; font-weight: 600; }

  /* ---- graph color settings ---- */
  #graphCard summary::before { content: "🎨 "; }
  #graphCard summary { cursor: pointer; }
  #graphCard .deck-label { display: inline; margin: 0; color: var(--ink-soft); opacity: 1; }
  #gsLevel {
    margin: .7rem 0 .3rem; font-size: .8rem; padding: .3rem .4rem;
    border: 1px solid #d8d2c2; border-radius: 6px; background: #fffdf8; color: var(--ink);
  }
  .gs-row { display: flex; align-items: center; gap: .6rem; margin: .3rem 0; font-size: .8rem; }
  .gs-row label { flex: 0 0 9.5rem; }
  .gs-row input[type="range"] { flex: 1; min-width: 0; accent-color: #837c6c; }
  .gs-val {
    flex: 0 0 3.2rem; text-align: right;
    font-family: var(--font-mono); font-size: .72rem; color: var(--ink-soft);
  }
  .gs-note { margin: 0 0 .6rem; font-size: .72rem; color: var(--ink-soft); }
  #graphCard button {
    font-family: var(--font-display); font-weight: 600; font-size: .72rem;
    padding: .3rem .75rem; border: 1px solid var(--card-edge); border-radius: 999px;
    background: #fffdf8; color: var(--ink); cursor: pointer;
  }
  #graphCard button:hover { background: #f1ecdf; }

  /* ---- folder tree ---- */
  .folders {
    background: var(--card);
    border: 1px solid var(--card-edge);
    border-radius: var(--radius-card);
    padding: 1rem 1.15rem;
  }
  .folders details { margin: .15rem 0; }
  .folders details details { margin-left: 1.1rem; }
  .folders summary {
    cursor: pointer;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: .92rem;
    padding: .25rem .35rem;
    border-radius: 6px;
    margin: 0;
  }
  .folders summary:hover { background: #f1ecdf; }
  .folders summary::before { content: "📁 "; }
  .folders details[open] > summary::before { content: "📂 "; }
  .folders .topic {
    margin-left: 2.1rem;
    padding: .2rem .35rem;
    font-size: .85rem;
  }
  .folders .topic::before { content: "📄 "; }
  .folders .topic .when {
    font-family: var(--font-mono);
    font-size: .68rem;
    color: var(--ink-soft);
    margin-left: .4rem;
  }
  #tree:empty::before {
    content: "Nothing filed yet — finished recordings appear here by semester / class / unit.";
    display: block;
    font-size: .88rem;
    color: var(--ink-soft);
    padding: .5rem 0;
  }

  #list:empty::before {
    content: "No sessions yet — press record to start your first one.";
    display: block;
    font-size: .88rem;
    color: var(--ink-soft);
    border: 1px dashed var(--card-edge);
    border-radius: var(--radius-card);
    padding: 1.5rem;
    text-align: center;
  }

  .rec {
    background: var(--card);
    border: 1px solid var(--card-edge);
    border-radius: var(--radius-card);
    padding: 1rem 1.15rem;
    margin: 0 0 .85rem;
  }
  .rec b {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1rem;
  }
  .status {
    font-family: var(--font-mono);
    font-size: .68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: .15rem .5rem;
    border-radius: 999px;
    margin-left: .5rem;
    vertical-align: 1px;
    background: #e9e4d6;
    color: var(--ink-soft);
  }
  .rec .del {
    float: right; border: none; background: none; cursor: pointer;
    color: var(--ink-soft); font-size: .85rem; padding: .1rem .3rem;
  }
  .rec .del:hover { color: #a8331f; }
  .status[data-s="recording"]    { background: #fbe4e0; color: #a8331f; }
  .status[data-s="transcribing"] { background: #f7e8cf; color: #93670f; }
  .status[data-s="done"]         { background: #dcf0ea; color: #226e5b; }
  .status[data-s="error"]        { background: #f4d9d9; color: #8f2323; }

  .progress { margin-top: .65rem; }
  .bar { height: 6px; border-radius: 999px; background: #e9e4d6; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--amber); transition: width .4s ease; }
  .bar-fill.indeterminate { width: 35%; animation: indeterminate 1.3s ease-in-out infinite; }
  @keyframes indeterminate {
    0%   { margin-left: -35%; }
    100% { margin-left: 100%; }
  }
  .progress-label {
    display: block; margin-top: .3rem; font-family: var(--font-mono); font-size: .7rem;
    color: var(--ink-soft); text-transform: uppercase; letter-spacing: .04em;
  }
  .error-msg {
    font-family: var(--font-mono); font-size: .82rem; color: #8f2323; background: #f4d9d9;
    border-radius: 6px; padding: .5rem .7rem; margin: .6rem 0 0; white-space: pre-wrap;
  }
  .tokens { font-family: var(--font-mono); font-size: .7rem; color: var(--ink-soft); margin: .5rem 0 0; }
  .src { font-family: var(--font-mono); font-size: .62rem; text-transform: uppercase; letter-spacing: .05em;
    background: #e6def5; color: #5b3f8f; border-radius: 999px; padding: .12rem .5rem; }

  .labels { display: flex; flex-wrap: wrap; gap: .4rem; margin: .7rem 0 .2rem; }
  .labels input {
    flex: 1 1 8rem; min-width: 6rem; padding: .35rem .5rem; font-size: .82rem;
    border: 1px solid #d8d2c2; border-radius: 6px; background: #fffdf8; color: var(--ink);
  }
  .labels textarea {
    flex: 1 1 100%; padding: .35rem .5rem; font-size: .82rem; font-family: inherit;
    border: 1px solid #d8d2c2; border-radius: 6px; background: #fffdf8; color: var(--ink);
    resize: vertical;
  }
  .labels button {
    padding: .35rem .8rem; font-size: .78rem; border: 0; border-radius: 6px; cursor: pointer;
    background: var(--amber); color: #3a2c00; font-weight: 600;
  }
  .lbl-hint { flex: 1 1 100%; font-size: .68rem; color: var(--ink-soft); font-style: italic; }

  h4 { font-family: var(--font-display); font-size: .8rem; margin: .8rem 0 .3rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .06em; }
  pre { white-space: pre-wrap; word-wrap: break-word; font-size: .88rem; margin: 0; }
  details summary { cursor: pointer; font-size: .82rem; color: var(--ink-soft); margin-top: .6rem; }
  details summary:focus-visible { outline: 2px solid var(--live); outline-offset: 2px; }
</style>
</head>
<body>
<div class="brand">
  <h1>listen</h1>
  <p class="tagline">lecture &amp; meeting transcriber</p>
</div>

<section class="deck" aria-label="Recording console">
  <div class="deck-row">
    <div class="deck-group">
      <span class="deck-label">Transport</span>
      <div id="controls">
        <button id="btn">● Record</button>
        <button id="pauseBtn" hidden>&#10074;&#10074; Pause</button>
        <span id="timer" class="timer">0:00</span>
        <select id="micSelect" title="Microphone"></select>
      </div>
    </div>
    <div class="deck-group">
      <span class="deck-label">Upload</span>
      <button id="uploadBtn" class="upload-btn" title="Upload audio, PDF, PowerPoint, or Word (or drop it anywhere on the page)">&#8686; Audio / Docs</button>
      <input type="file" id="fileInput" accept=".mp3,.m4a,.wav,.webm,.ogg,.pdf,.pptx,.docx" hidden>
      <button id="hwBtn" class="upload-btn" title="Upload homework (PDF or photo) — auto-filed, then link it to a due date">&#8686; Homework</button>
      <input type="file" id="hwInput" accept=".pdf,image/*" hidden>
      <button id="ytBtn" class="upload-btn" title="Add a YouTube video — save the link as a reference note, or transcribe it like a lecture">&#9654; YouTube</button>
    </div>
    <div class="deck-group signal">
      <span class="deck-label">Signal</span>
      <span id="mic" class="mic"></span>
    </div>
  </div>
  <canvas id="wave"></canvas>
</section>

<div class="main">
  <section class="sessions">
    <span class="deck-label">Recent</span>
    <div id="quizArea"></div>
    <div id="reviewArea"></div>
    <div id="list"></div>
  </section>
  <div class="side">
    <section class="folders">
      <span class="deck-label">Library</span>
      <div id="tree"></div>
    </section>
    <section class="folders" id="merge" hidden></section>
    <section class="folders" id="graphCard">
      <details>
        <summary class="deck-label">Graph colors</summary>
        <select id="gsLevel" onchange="gsShowLevel()">
          <option value="class">Class hubs</option>
          <option value="unit">Unit hubs</option>
          <option value="topic">Topic notes</option>
        </select>
        <div class="gs-sliders">
          <div class="gs-row" data-level="class"><label>Fade min (cool hues)</label><input type="range" id="gs_class_drop_min" min="0" max="100" oninput="gsVal(this)"><span class="gs-val"></span></div>
          <div class="gs-row" data-level="class"><label>Fade max (warm hues)</label><input type="range" id="gs_class_drop_max" min="0" max="100" oninput="gsVal(this)"><span class="gs-val"></span></div>
          <div class="gs-row" data-level="unit"><label>Fade min (cool hues)</label><input type="range" id="gs_unit_drop_min" min="0" max="100" oninput="gsVal(this)"><span class="gs-val"></span></div>
          <div class="gs-row" data-level="unit"><label>Fade max (warm hues)</label><input type="range" id="gs_unit_drop_max" min="0" max="100" oninput="gsVal(this)"><span class="gs-val"></span></div>
          <div class="gs-row" data-level="unit"><label>Hue shift &plusmn;</label><input type="range" id="gs_unit_hue_shift" min="0" max="100" oninput="gsVal(this)"><span class="gs-val"></span></div>
          <div class="gs-row" data-level="topic"><label>Fade min (cool hues)</label><input type="range" id="gs_topic_drop_min" min="0" max="100" oninput="gsVal(this)"><span class="gs-val"></span></div>
          <div class="gs-row" data-level="topic"><label>Fade max (warm hues)</label><input type="range" id="gs_topic_drop_max" min="0" max="100" oninput="gsVal(this)"><span class="gs-val"></span></div>
          <div class="gs-row" data-level="topic"><label>Hue shift &plusmn;</label><input type="range" id="gs_topic_hue_shift" min="0" max="100" oninput="gsVal(this)"><span class="gs-val"></span></div>
        </div>
        <p class="gs-note">Semester hubs stay white. Fades scale with hue warmth — warm colors calm down more.</p>
        <button onclick="saveGraphSettings(this)">Save &amp; recolor</button>
      </details>
    </section>
    <section class="folders" id="practice">
      <span class="deck-label">Practice</span>
      <div class="merge-manual">
        <select id="pSem" onchange="pScope()" title="Filter by semester"></select>
        <select id="pClass" onchange="pScope()"></select>
        <select id="pUnit"></select>
        <select id="pKind">
          <option value="quiz">Quiz — 10 q</option>
          <option value="test">Test — 20 q</option>
        </select>
        <button onclick="genQuiz(this)">Generate</button>
      </div>
      <div id="pastQuizzes"></div>
    </section>
    <section class="folders" id="review">
      <span class="deck-label">Review</span>
      <div class="merge-manual">
        <select id="rSem" onchange="rScope()" title="Filter by semester"></select>
        <select id="rClass" onchange="rScope()"></select>
        <select id="rUnit"></select>
        <button onclick="genCards(this)">Make cards</button>
        <button onclick="dlCheat()">Cheat sheet</button>
      </div>
      <div id="dueCount"></div>
      <p><a href="/cards_due.ics">&#128197; Flashcard due dates (.ics)</a></p>
    </section>
  </div>
</div>

<script>
let mr, rid, recording = false;
let audioCtx, analyser, rafId, timerId, startTime;
let openAssignments = [];
const btn = document.getElementById('btn');
const timer = document.getElementById('timer');
const mic = document.getElementById('mic');
const micSelect = document.getElementById('micSelect');
const canvas = document.getElementById('wave');
const ctx = canvas.getContext('2d');

async function loadMics() {
  const devices = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'audioinput');
  const saved = localStorage.getItem('micId');
  micSelect.innerHTML = devices.map((d, i) =>
    `<option value="${d.deviceId}">${esc(d.label || 'Microphone ' + (i + 1))}</option>`).join('');
  if (saved && devices.some(d => d.deviceId === saved)) micSelect.value = saved;
}
micSelect.onchange = () => localStorage.setItem('micId', micSelect.value);
navigator.mediaDevices.addEventListener('devicechange', loadMics);
loadMics();

function fmt(s) { return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }

function drawWave() {
  rafId = requestAnimationFrame(drawWave);
  const buf = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(buf);
  // peak deviation from the 128 silence baseline → is the mic actually hearing anything?
  let peak = 0;
  for (let i = 0; i < buf.length; i++) peak = Math.max(peak, Math.abs(buf[i] - 128));
  if (peak > 3) { mic.textContent = '🎤 receiving audio'; mic.style.color = '#3FA78C'; }
  else { mic.textContent = '🔇 no input'; mic.style.color = '#D9432F'; }
  // size the backing store to the displayed size so the line isn't stretched
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#DE9A32';
  ctx.beginPath();
  const slice = canvas.width / buf.length;
  for (let i = 0; i < buf.length; i++) {
    const y = (buf[i] / 128) * canvas.height / 2;
    const x = i * slice;
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  }
  ctx.stroke();
}

function startMeters(stream) {
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  canvas.classList.add('on');
  mic.classList.add('on');
  drawWave();
  startTime = Date.now();
  timer.textContent = '0:00';
  timer.classList.add('on');
  timerId = setInterval(() => {
    if (mr && mr.state === 'paused') return; // hold the clock while paused
    timer.textContent = fmt(Math.floor((Date.now() - startTime) / 1000));
  }, 1000);
}

function stopMeters() {
  cancelAnimationFrame(rafId);
  clearInterval(timerId);
  canvas.classList.remove('on');
  timer.classList.remove('on');
  mic.classList.remove('on');
  if (audioCtx) audioCtx.close();
}

btn.onclick = async () => {
  if (!recording) {
    let stream;
    try {
      const audio = micSelect.value
        ? { deviceId: { exact: micSelect.value }, autoGainControl: true, noiseSuppression: true }
        : { autoGainControl: true, noiseSuppression: true };
      stream = await navigator.mediaDevices.getUserMedia({ audio });
    } catch (e) {
      alert('Mic access failed: ' + e.name + ' — ' + e.message + '\nAllow the microphone for 127.0.0.1 and try again.');
      return;
    }
    loadMics(); // labels are blank until permission is granted once
    rid = (await (await fetch('/start', { method: 'POST' })).json()).id;
    mr = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    mr.ondataavailable = e => { if (e.data.size) fetch('/chunk/' + rid, { method: 'POST', body: e.data }); };
    mr.onstop = () => { fetch('/stop/' + rid, { method: 'POST' }); stream.getTracks().forEach(t => t.stop()); refresh(); };
    mr.start(10000); // 10s chunks → survives a tab crash
    startMeters(stream);
    recording = true;
    btn.textContent = '■ Stop';
    btn.classList.add('recording');
    pauseBtn.hidden = false;
    pauseBtn.textContent = '❙❙ Pause';
  } else {
    if (mr.state === 'paused') mr.resume(); // stop while paused loses the tail otherwise
    mr.stop();
    recording = false;
    btn.textContent = '● Record';
    btn.classList.remove('recording');
    pauseBtn.hidden = true;
    stopMeters();
  }
};

const pauseBtn = document.getElementById('pauseBtn');
let pausedAt = 0;
pauseBtn.onclick = () => {
  if (mr.state === 'recording') {
    mr.pause(); // native MediaRecorder pause — paused audio never enters the file
    pausedAt = Date.now();
    pauseBtn.textContent = '▶ Resume';
    timer.classList.remove('on');
  } else if (mr.state === 'paused') {
    mr.resume();
    startTime += Date.now() - pausedAt; // timer skips the paused stretch
    pauseBtn.textContent = '❙❙ Pause';
    timer.classList.add('on');
  }
};

function esc(s) { return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
function escAttr(s) { return (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

async function refresh() {
  // ponytail: don't blow away a label field the user is mid-edit on the 5s tick
  if (document.activeElement && document.getElementById('list').contains(document.activeElement)) return;
  const rows = await (await fetch('/recordings')).json();

  if (rows.some(r => r.source === 'homework' && r.status === 'done')) {
    try { const a = await (await fetch('/assignments_open')).json(); if (Array.isArray(a)) openAssignments = a; } catch {}
  }
  updateDatalists(rows);
  const openK = new Set([...document.querySelectorAll('#list details[open]')].map(d => d.dataset.k).filter(Boolean));
  document.getElementById('list').innerHTML = rows.map(r => `
    <div class="rec">
      <b>${esc(r.title || '')}</b> <span class="status" data-s="${r.status}">${r.status}</span>${r.obsidian_uri ? ` <a class="obs" href="${escAttr(r.obsidian_uri)}" title="Open note in Obsidian">&#8599; Obsidian</a>` : ''}${r.source && r.source !== 'local' ? ` <span class="src">via ${esc(r.source.replace('upload_audio', 'upload'))}</span>` : ''}<button class="del" title="Delete recording" onclick="deleteRec('${r.id}')">&#10005;</button>
      ${r.status === 'transcribing' ? progressBar(r) : ''}
      ${r.status === 'error' ? `<p class="error-msg">${esc(r.summary || 'Unknown error')}</p>` : ''}
      ${r.status === 'done' && !r.transcript ? '<p><em>No speech detected.</em></p>' : ''}
      ${r.status !== 'error' ? labelEditor(r) : ''}
      ${r.source === 'homework' && r.status === 'done' ? hwLinker(r) : ''}
      ${r.status === 'done' && r.summary ? `<h4>Summary</h4><pre>${esc(r.summary)}</pre>` : ''}
      ${r.source === 'syllabus' && r.status === 'done' ? `<p><a href="/assignments/${r.id}.ics">&#128197; Download due dates (.ics) — import into Google Calendar</a></p>` : ''}
      ${r.status === 'done' && (r.tokens_in || r.tokens_out) ? `<p class="tokens">${r.tokens_in || 0} in / ${r.tokens_out || 0} out tokens</p>` : ''}
      ${r.transcript ? `<details><summary>Transcript</summary><pre>${esc(r.transcript)}</pre></details>` : ''}
    </div>`).join('');
  for (const d of document.querySelectorAll('#list details[data-k]'))
    if (openK.has(d.dataset.k)) d.open = true;
  renderTree(rows);
  renderMerge(rows);

}

// google-style suggestions while typing labels: native <datalist>, options = existing labels
function updateDatalists(rows) {
  for (const [id, field] of [['dl-sem', 'semester'], ['dl-class', 'class'], ['dl-unit', 'unit'], ['dl-topic', 'topic']]) {
    let dl = document.getElementById(id);
    if (!dl) { dl = document.createElement('datalist'); dl.id = id; document.body.appendChild(dl); }
    const vals = [...new Set(rows.map(r => (r[field] || '').trim()).filter(Boolean))].sort();
    dl.innerHTML = vals.map(v => `<option value="${escAttr(v)}">`).join('');
  }
}

function renderTree(rows) {
  // semester > class > unit > topics, from filed recordings only
  const tree = {};
  for (const r of rows) {
    if (r.status !== 'done' || !r.semester || !r.class || !r.unit) continue;
    (((tree[r.semester] ??= {})[r.class] ??= {})[r.unit] ??= []).push(r);
  }
  const open = new Set([...document.querySelectorAll('#tree details[open]')].map(d => d.dataset.k));
  const det = (k, label, inner) =>
    `<details data-k="${escAttr(k)}"${open.has(k) ? ' open' : ''}><summary>${esc(label)}</summary>${inner}</details>`;
  document.getElementById('tree').innerHTML = Object.keys(tree).sort().map(sem =>
    det(sem, sem, Object.keys(tree[sem]).sort().map(cls =>
      det(sem + '/' + cls, cls, Object.keys(tree[sem][cls]).sort().map(unit =>
        det(sem + '/' + cls + '/' + unit, unit, tree[sem][cls][unit]
          .sort((a, b) => (a.created_at || '').localeCompare(b.created_at || ''))
          .map(r => `<div class="topic">${r.obsidian_uri
              ? `<a class="obs" href="${escAttr(r.obsidian_uri)}" title="Open note in Obsidian">${esc(r.topic || r.title || 'untitled')}</a>`
              : esc(r.topic || r.title || 'untitled')}<span class="when">${(r.created_at || '').slice(0, 10)}</span></div>`)
          .join(''))
      ).join(''))
    ).join(''))
  ).join('');
}

// ---- unit merge panel: suggests near-duplicate units, lets the user merge any two ----
function renderMerge(rows) {
  const panel = document.getElementById('merge');
  if (document.activeElement && panel.contains(document.activeElement)) return; // mid-pick on the 5s tick
  const units = {};                       // "sem||cls" -> Set of unit names
  for (const r of rows) {
    if (r.status !== 'done' || !r.semester || !r.class || !r.unit) continue;
    (units[r.semester + '||' + r.class] ??= new Set()).add(r.unit);
  }
  const words = u => new Set(u.toLowerCase().split(/[^a-z0-9]+/).filter(w => w.length >= 4).map(w => w.replace(/s$/, '')));
  const sugg = [];
  const opts = [];                        // every sem||cls||unit, for the manual selects
  for (const [k, set] of Object.entries(units)) {
    const us = [...set].sort();
    for (const u of us) opts.push(k + '||' + u);
    for (let i = 0; i < us.length; i++)
      for (let j = i + 1; j < us.length; j++)
        if ([...words(us[i])].some(w => words(us[j]).has(w)))
          sugg.push({ k, a: us[i], b: us[j] });
  }
  if (opts.length < 2) { panel.hidden = true; panel.innerHTML = ''; return; }
  panel.hidden = false;
  const cls = k => k.split('||')[1];
  panel.innerHTML = `
    <span class="deck-label">Merge units</span>
    ${sugg.length ? '<p class="merge-hint">Possible duplicates:</p>' : ''}
    ${sugg.map(s => `<div class="merge-sugg">
      <span><em>${esc(s.a)}</em> &harr; <em>${esc(s.b)}</em><span class="merge-cls">${esc(cls(s.k))}</span></span>
      <span class="merge-actions">
        <button data-k="${escAttr(s.k)}" data-from="${escAttr(s.a)}" data-to="${escAttr(s.b)}">keep &ldquo;${esc(s.b)}&rdquo;</button>
        <button data-k="${escAttr(s.k)}" data-from="${escAttr(s.b)}" data-to="${escAttr(s.a)}">keep &ldquo;${esc(s.a)}&rdquo;</button>
      </span>
    </div>`).join('')}
    <div class="merge-manual">
      <select id="mergeFrom" onchange="mergeFromChanged()">${opts.map(o =>
        `<option value="${escAttr(o)}">${esc(cls(o) + ' / ' + o.split('||')[2])}</option>`).join('')}</select>
      <span class="merge-into">into</span>
      <select id="mergeTo"></select>
      <button onclick="manualMerge()">Merge</button>
    </div>`;
  mergeFromChanged();
}

async function doMerge(k, from, to) {
  const [semester, klass] = k.split('||');

  const resp = await (await fetch('/merge_units', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ semester, class: klass, from_unit: from, to_unit: to }),

  if (!resp.ok) alert(resp.error || 'merge failed');

  const from = document.getElementById('mergeFrom').value;

  const [sem, cls, unit] = from.split('||');
  doMerge(sem + '||' + cls, unit, to.split('||')[2]);

// Fill a semester>class>unit cascade of <select>s from filed rows.
// Blank semester = all semesters; blank unit = whole class. Preserves current picks.
function fillScope(rows, semSel, clsSel, unitSel) {
  const done = rows.filter(r => r.status === 'done' && r.class);
  const uniq = arr => [...new Set(arr)].sort();
  const opt = (v, label) => `<option value="${escAttr(v)}">${esc(label ?? v)}</option>`;

  const sems = uniq(done.filter(r => r.semester).map(r => r.semester));
  const semCur = semSel.value;
  semSel.innerHTML = opt('', 'All semesters') + sems.map(s => opt(s)).join('');
  if (sems.includes(semCur)) semSel.value = semCur;

  const sem = semSel.value;
  const inSem = done.filter(r => !sem || r.semester === sem);
  const classes = uniq(inSem.map(r => r.class));
  const clsCur = clsSel.value;
  clsSel.innerHTML = classes.map(c => opt(c)).join('');
  if (classes.includes(clsCur)) clsSel.value = clsCur;

  const cls = clsSel.value;
  const units = uniq(inSem.filter(r => r.class === cls && r.unit).map(r => r.unit));
  unitSel.innerHTML = opt('', 'whole class') + units.map(u => opt(u)).join('');
}

async function submitQuiz(btn, qid) {

  btn.disabled = true; btn.textContent = 'grading…';
  try {
    const g = await (await fetch(`/quiz/${qid}/submit`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers }),
    })).json();
    pastLoaded = 0;
    renderQuizResults(qid, g.questions, g.results, g.score);
  } finally { btn.disabled = false; }
}

function renderQuizResults(qid, questions, results, score) {
  document.getElementById('quizArea').innerHTML = `<div class="quiz" data-qid="${qid}">
    <div class="quiz-head"><b>Score: ${score}%</b>
      <button onclick="closeQuiz()" title="Close">&#10005;</button></div>
    ${questions.map((qq, i) => {
      const r = results[i] || {};
      let verdict;
      if (qq.type === 'mcq') {
        const ok = r.correct;
        verdict = `<p class="verdict ${ok ? 'good' : 'bad'}">${ok ? '✓ correct' :
          `✗ ${r.answer === null || r.answer === undefined || r.answer === '' ? 'skipped' : 'you picked: ' + esc(String(qq.choices[r.answer] ?? r.answer))} — answer: ${esc(String(qq.choices[qq.answer] ?? qq.answer))}`}
          ${qq.explanation ? '<br>' + esc(qq.explanation) : ''}</p>`;
      } else {
        const s = r.score ?? 0;
        verdict = `<p class="verdict ${s >= 1 ? 'good' : 'bad'}">${s >= 1 ? '✓' : s > 0 ? '½' : '✗'} ${esc(r.feedback || '')}
          <br>Model answer: ${esc(qq.answer || '')}</p>
          <p class="verdict">You wrote: ${esc(String(r.answer || '(blank)'))}</p>`;
      }
      return `<div class="q"><p>${i + 1}. ${esc(qq.q)}</p>${verdict}</div>`;
    }).join('')}
  </div>`;
}

async function openQuiz(qid) {
  const q = await (await fetch('/quiz/' + qid)).json();
  document.activeElement?.blur();
  if (q.answers) renderQuizResults(qid, q.questions, q.answers, q.score);
  else renderQuizForm(q);
  document.getElementById('quizArea').scrollIntoView({ behavior: 'smooth' });
}

function closeQuiz() { document.getElementById('quizArea').innerHTML = ''; }

// ---- flashcard review: due count re-renders on refresh (focus-guarded);
// ---- the review session lives in #reviewArea, which refresh() never touches.
let cardRows = [], cardsDue = [];
async function renderReview(rows) {
  const card = document.getElementById('review');
  if (document.activeElement && card.contains(document.activeElement)) return;
  cardRows = rows;
  fillScope(rows, document.getElementById('rSem'), document.getElementById('rClass'), document.getElementById('rUnit'));
  let due = [];
  try { const d = await (await fetch('/cards/due')).json(); if (Array.isArray(d)) due = d; } catch {}
  cardsDue = due;  // snapshot for startReview() — avoids serialising cards into an onclick attribute
  const el = document.getElementById('dueCount');
  el.innerHTML = due.length
    ? `<button class="submit" onclick="startReview()">Review ${due.length} due</button>`
    : '<p class="gs-note">No cards due.</p>';
}
function rScope() {
  fillScope(cardRows, document.getElementById('rSem'), document.getElementById('rClass'), document.getElementById('rUnit'));
}
async function genCards(btn) {
  const body = {
    semester: document.getElementById('rSem').value,
    class: document.getElementById('rClass').value,
    unit: document.getElementById('rUnit').value,
  };
  if (!body.class) { alert('record and file some lectures first'); return; }
  btn.disabled = true; btn.textContent = 'making…';
  try {
    const r = await (await fetch('/cards/generate', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    })).json();
    alert(r.error ? r.error : `Made ${r.count} cards.`);
  } finally { btn.disabled = false; btn.textContent = 'Make cards'; document.activeElement?.blur(); }
}
function dlCheat() {
  const cls = document.getElementById('rClass').value;
  if (!cls) { alert('pick a class'); return; }
  const qs = new URLSearchParams({
    semester: document.getElementById('rSem').value,
    class: cls,
    unit: document.getElementById('rUnit').value,
  }).toString();
  window.location = '/cheatsheet?' + qs;
}
let reviewQueue = [];
function startReview() { reviewQueue = cardsDue.slice(); showCard(); }
function showCard() {
  const area = document.getElementById('reviewArea');
  if (!reviewQueue.length) { area.innerHTML = '<div class="quiz"><b>Done reviewing.</b> <button onclick="closeReview()">✕</button></div>'; return; }
  const c = reviewQueue[0];
  area.innerHTML = `<div class="quiz" data-cid="${c.id}">
    <div class="quiz-head"><b>${esc(c.class || '')}${c.unit ? ' / ' + esc(c.unit) : ''}</b>
      <button onclick="closeReview()" title="Close">✕</button></div>
    <div class="q"><p>${esc(c.front)}</p>
      <p class="cardback" style="display:none">${esc(c.back)}</p></div>
    <button class="submit" id="flipBtn" onclick="flipCard()">Show answer</button>
    <div id="grades" style="display:none">
      ${['again', 'hard', 'good', 'easy'].map(g => `<button class="submit" onclick="gradeCard('${g}')">${g}</button>`).join(' ')}
    </div>
  </div>`;
  document.getElementById('reviewArea').scrollIntoView({ behavior: 'smooth' });
}
function flipCard() {
  document.querySelector('#reviewArea .cardback').style.display = '';
  document.getElementById('flipBtn').style.display = 'none';
  document.getElementById('grades').style.display = '';
}
async function gradeCard(grade) {
  const cid = document.querySelector('#reviewArea .quiz').dataset.cid;
  try {
    await fetch(`/cards/${cid}/review`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ grade }),
    });
  } catch {}
  reviewQueue.shift(); showCard();
}
function closeReview() { document.getElementById('reviewArea').innerHTML = ''; reviewQueue = []; }

setInterval(refresh, 5000);
refresh();
</script>
</body>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>listen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --stone:      #EDE9DE; /* page ground, warm cardboard */
    --panel:      #2B2A28; /* transport console, brushed-graphite chassis */
    --panel-edge: #444038; /* console bevel highlight */
    --lcd:        #F3EEE2; /* cream readout window */
    --ink:        #2B2A28;
    --ink-soft:   #837c6c;
    --ink-on-panel: #C9C4B6;
    --rec:        #D9432F; /* transport REC lamp */
    --live:       #3FA78C; /* signal LED, "hearing audio" */
    --amber:      #DE9A32; /* transcribing */
    --card:       #FBF9F3;
    --card-edge:  #E1DACB;
    --radius-panel: 18px;
    --radius-card: 10px;
    --font-display: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  body {
    font-family: system-ui, sans-serif;
    background: var(--stone);
    color: var(--ink);
    max-width: 720px;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 4rem;
    line-height: 1.5;
  }

  .brand { margin-bottom: 1.75rem; }
  .brand h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.8rem;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .tagline {
    margin: .15rem 0 0;
    font-size: .8rem;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .deck-label {
    display: block;
    font-family: var(--font-display);
    font-size: .68rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-on-panel);
    opacity: .65;
    margin-bottom: .5rem;
  }

  /* ---- transport console ---- */
  .deck {
    background: var(--panel);
    border-radius: var(--radius-panel);
    padding: 1.4rem 1.5rem 1.6rem;
    box-shadow:
      inset 0 1px 0 var(--panel-edge),
      0 10px 24px -14px rgba(0,0,0,.55);
  }

  .deck-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .deck-group.signal { text-align: right; }

  #controls { display: flex; align-items: center; gap: 1rem; }

  button#btn, button.upload-btn {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: .95rem;
    letter-spacing: .01em;
    padding: .65rem 1.3rem;
    border-radius: 999px;
    border: 1px solid #55504a;
    background: #38352f;
    color: var(--ink-on-panel);
    cursor: pointer;
    box-shadow: 0 1px 0 rgba(255,255,255,.05) inset, 0 2px 4px rgba(0,0,0,.3);
    transition: transform .12s ease, background .2s ease, box-shadow .2s ease;
  }
  button#btn:hover, button.upload-btn:hover { background: #423e37; }
  button#btn:active, button.upload-btn:active { transform: translateY(1px); }
  button#btn:focus-visible {
    outline: 2px solid var(--live);
    outline-offset: 2px;
  }

  select#micSelect {
    font-family: var(--font-mono);
    font-size: .78rem;
    background: #38352f;
    color: var(--ink-on-panel);
    border: 1px solid #55504a;
    border-radius: 6px;
    padding: .4rem .5rem;
  }
  button#btn.recording {
    background: var(--rec);
    color: #fff;
    border-color: var(--rec);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(217,67,47,.55); }
    50%      { box-shadow: 0 0 0 7px rgba(217,67,47,0); }
  }
  @media (prefers-reduced-motion: reduce) {
    button#btn.recording { animation: none; }
  }

  /* timer as a recessed LCD counter window */
  .timer {
    display: none;
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 1.05rem;
    background: var(--lcd);
    color: var(--ink);
    padding: .45rem .7rem;
    border-radius: 6px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.35);
    letter-spacing: .03em;
  }
  .timer.on { display: inline-block; }

  .mic {
    display: none;
    font-size: .82rem;
    font-family: var(--font-mono);
    color: var(--ink-on-panel);
  }
  .mic.on { display: inline; }

  /* oscilloscope panel */
  #wave {
    display: none;
    width: 100%;
    height: 84px;
    margin-top: 1.25rem;
    border-radius: 8px;
    background:
      linear-gradient(var(--panel-edge) 1px, transparent 1px) 0 50% / 100% 21px,
      #221f1c;
    box-shadow: inset 0 1px 4px rgba(0,0,0,.5);
  }
  #wave.on { display: block; }

  /* ---- sessions ---- */
  .sessions { margin-top: 2.25rem; }
  .sessions > .deck-label { color: var(--ink-soft); opacity: 1; margin-bottom: .75rem; }

  #list:empty::before {
    content: "No sessions yet — press record to start your first one.";
    display: block;
    font-size: .88rem;
    color: var(--ink-soft);
    border: 1px dashed var(--card-edge);
    border-radius: var(--radius-card);
    padding: 1.5rem;
    text-align: center;
  }

  .rec {
    background: var(--card);
    border: 1px solid var(--card-edge);
    border-radius: var(--radius-card);
    padding: 1rem 1.15rem;
    margin: 0 0 .85rem;
  }
  .rec b {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1rem;
  }
  .status {
    font-family: var(--font-mono);
    font-size: .68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: .15rem .5rem;
    border-radius: 999px;
    margin-left: .5rem;
    vertical-align: 1px;
    background: #e9e4d6;
    color: var(--ink-soft);
  }
  .rec .del {
    float: right; border: none; background: none; cursor: pointer;
    color: var(--ink-soft); font-size: .85rem; padding: .1rem .3rem;
  }
  .rec .del:hover { color: #a8331f; }
  .status[data-s="recording"]    { background: #fbe4e0; color: #a8331f; }
  .status[data-s="transcribing"] { background: #f7e8cf; color: #93670f; }
  .status[data-s="done"]         { background: #dcf0ea; color: #226e5b; }
  .status[data-s="error"]        { background: #f4d9d9; color: #8f2323; }

  .progress { margin-top: .65rem; }
  .bar { height: 6px; border-radius: 999px; background: #e9e4d6; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--amber); transition: width .4s ease; }
  .bar-fill.indeterminate { width: 35%; animation: indeterminate 1.3s ease-in-out infinite; }
  @keyframes indeterminate {
    0%   { margin-left: -35%; }
    100% { margin-left: 100%; }
  }
  .progress-label {
    display: block; margin-top: .3rem; font-family: var(--font-mono); font-size: .7rem;
    color: var(--ink-soft); text-transform: uppercase; letter-spacing: .04em;
  }
  .error-msg {
    font-family: var(--font-mono); font-size: .82rem; color: #8f2323; background: #f4d9d9;
    border-radius: 6px; padding: .5rem .7rem; margin: .6rem 0 0; white-space: pre-wrap;
  }
  .tokens { font-family: var(--font-mono); font-size: .7rem; color: var(--ink-soft); margin: .5rem 0 0; }
  .src { font-family: var(--font-mono); font-size: .62rem; text-transform: uppercase; letter-spacing: .05em;
    background: #e6def5; color: #5b3f8f; border-radius: 999px; padding: .12rem .5rem; }

  .labels { display: flex; flex-wrap: wrap; gap: .4rem; margin: .7rem 0 .2rem; }
  .labels input {
    flex: 1 1 8rem; min-width: 6rem; padding: .35rem .5rem; font-size: .82rem;
    border: 1px solid #d8d2c2; border-radius: 6px; background: #fffdf8; color: var(--ink);
  }
  .labels textarea {
    flex: 1 1 100%; padding: .35rem .5rem; font-size: .82rem; font-family: inherit;
    border: 1px solid #d8d2c2; border-radius: 6px; background: #fffdf8; color: var(--ink);
    resize: vertical;
  }
  .labels button {
    padding: .35rem .8rem; font-size: .78rem; border: 0; border-radius: 6px; cursor: pointer;
    background: var(--amber); color: #3a2c00; font-weight: 600;
  }
  .lbl-hint { flex: 1 1 100%; font-size: .68rem; color: var(--ink-soft); font-style: italic; }

  h4 { font-family: var(--font-display); font-size: .8rem; margin: .8rem 0 .3rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .06em; }
  pre { white-space: pre-wrap; word-wrap: break-word; font-size: .88rem; margin: 0; }
  details summary { cursor: pointer; font-size: .82rem; color: var(--ink-soft); margin-top: .6rem; }
  details summary:focus-visible { outline: 2px solid var(--live); outline-offset: 2px; }
</style>
</head>
<body>
<div class="brand">
  <h1>listen</h1>
  <p class="tagline">lecture &amp; meeting transcriber</p>
</div>

<section class="deck" aria-label="Recording console">
  <div class="deck-row">
    <div class="deck-group">
      <span class="deck-label">Transport</span>
      <div id="controls">
        <button id="btn">● Record</button>
        <span id="timer" class="timer">0:00</span>
        <select id="micSelect" title="Microphone"></select>
      </div>
    </div>
    <div class="deck-group">
      <span class="deck-label">Upload</span>
      <button id="uploadBtn" class="upload-btn" title="Upload audio or a PDF (or drop it anywhere on the page)">&#8686; Audio / PDF</button>
      <input type="file" id="fileInput" accept=".mp3,.m4a,.wav,.webm,.ogg,.pdf" hidden>
    </div>
    <div class="deck-group signal">
      <span class="deck-label">Signal</span>
      <span id="mic" class="mic"></span>
    </div>
  </div>
  <canvas id="wave"></canvas>
</section>

<section class="sessions">
  <span class="deck-label">Sessions</span>
  <div id="list"></div>
</section>

<script>
let mr, rid, recording = false;
let audioCtx, analyser, rafId, timerId, startTime;
const btn = document.getElementById('btn');
const timer = document.getElementById('timer');
const mic = document.getElementById('mic');
const micSelect = document.getElementById('micSelect');
const canvas = document.getElementById('wave');
const ctx = canvas.getContext('2d');

async function loadMics() {
  const devices = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'audioinput');
  const saved = localStorage.getItem('micId');
  micSelect.innerHTML = devices.map((d, i) =>
    `<option value="${d.deviceId}">${esc(d.label || 'Microphone ' + (i + 1))}</option>`).join('');
  if (saved && devices.some(d => d.deviceId === saved)) micSelect.value = saved;
}
micSelect.onchange = () => localStorage.setItem('micId', micSelect.value);
navigator.mediaDevices.addEventListener('devicechange', loadMics);
loadMics();

function fmt(s) { return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }

function drawWave() {
  rafId = requestAnimationFrame(drawWave);
  const buf = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(buf);
  // peak deviation from the 128 silence baseline → is the mic actually hearing anything?
  let peak = 0;
  for (let i = 0; i < buf.length; i++) peak = Math.max(peak, Math.abs(buf[i] - 128));
  if (peak > 3) { mic.textContent = '🎤 receiving audio'; mic.style.color = '#3FA78C'; }
  else { mic.textContent = '🔇 no input'; mic.style.color = '#D9432F'; }
  // size the backing store to the displayed size so the line isn't stretched
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#DE9A32';
  ctx.beginPath();
  const slice = canvas.width / buf.length;
  for (let i = 0; i < buf.length; i++) {
    const y = (buf[i] / 128) * canvas.height / 2;
    const x = i * slice;
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  }
  ctx.stroke();
}

function startMeters(stream) {
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  canvas.classList.add('on');
  mic.classList.add('on');
  drawWave();
  startTime = Date.now();
  timer.textContent = '0:00';
  timer.classList.add('on');
  timerId = setInterval(() => { timer.textContent = fmt(Math.floor((Date.now() - startTime) / 1000)); }, 1000);
}

function stopMeters() {
  cancelAnimationFrame(rafId);
  clearInterval(timerId);
  canvas.classList.remove('on');
  timer.classList.remove('on');
  mic.classList.remove('on');
  if (audioCtx) audioCtx.close();
}

btn.onclick = async () => {
  if (!recording) {
    let stream;
    try {
      const audio = micSelect.value
        ? { deviceId: { exact: micSelect.value }, autoGainControl: true, noiseSuppression: true }
        : { autoGainControl: true, noiseSuppression: true };
      stream = await navigator.mediaDevices.getUserMedia({ audio });
    } catch (e) {
      alert('Mic access failed: ' + e.name + ' — ' + e.message + '\nAllow the microphone for 127.0.0.1 and try again.');
      return;
    }
    loadMics(); // labels are blank until permission is granted once
    rid = (await (await fetch('/start', { method: 'POST' })).json()).id;
    mr = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    mr.ondataavailable = e => { if (e.data.size) fetch('/chunk/' + rid, { method: 'POST', body: e.data }); };
    mr.onstop = () => { fetch('/stop/' + rid, { method: 'POST' }); stream.getTracks().forEach(t => t.stop()); refresh(); };
    mr.start(10000); // 10s chunks → survives a tab crash
    startMeters(stream);
    recording = true;
    btn.textContent = '■ Stop';
    btn.classList.add('recording');
  } else {
    mr.stop();
    recording = false;
    btn.textContent = '● Record';
    btn.classList.remove('recording');
    stopMeters();
  }
};

function esc(s) { return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
function escAttr(s) { return (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

const STAGE_LABEL = { loading_model: 'loading model', transcribing: 'transcribing', summarizing: 'summarizing' };

function labelEditor(r) {
  const live = r.status !== 'done';
  const hint = live
    ? '<span class="lbl-hint">set now — files to Obsidian when transcription finishes; Claude fills blanks</span>'
    : '';
  return `<div class="labels" data-rid="${r.id}">
    <input class="lbl-sem"   placeholder="semester" value="${escAttr(r.semester)}">
    <input class="lbl-class" placeholder="class" value="${escAttr(r.class)}">
    <input class="lbl-unit"  placeholder="unit"  value="${escAttr(r.unit)}">
    <input class="lbl-topic" placeholder="topic" value="${escAttr(r.topic)}">
    <textarea class="lbl-notes" rows="2"
      placeholder="your notes — woven into the AI summary on save">${esc(r.notes || '')}</textarea>
    <button onclick="saveLabels('${r.id}')">${live ? 'Save labels' : 'Save to Obsidian'}</button>
    ${hint}
  </div>`;
}

const fileInput = document.getElementById('fileInput');
document.getElementById('uploadBtn').onclick = () => fileInput.click();
fileInput.onchange = () => { uploadFile(fileInput.files[0]); fileInput.value = ''; };
document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => { e.preventDefault(); uploadFile(e.dataTransfer.files[0]); });

async function uploadFile(f) {
  if (!f) return;
  let kind = 'audio';
  if (f.name.toLowerCase().endsWith('.pdf')) {
    kind = confirm('Is this a syllabus?\nOK = syllabus (extract due dates to calendar)\nCancel = lecture material') ? 'syllabus' : 'pdf';
  }
  const resp = await (await fetch(`/upload?kind=${kind}&filename=${encodeURIComponent(f.name)}`,
    { method: 'POST', body: f })).json();
  if (resp.error) alert(resp.error);
  refresh();
}

async function deleteRec(rid) {
  if (!confirm('Delete this recording and its audio? The Obsidian note (if written) stays.')) return;
  await fetch(`/recordings/${rid}`, { method: 'DELETE' });
  // the clicked ✕ still holds focus inside #list, which makes refresh() skip
  document.activeElement.blur();
  refresh();
}

async function saveLabels(rid) {
  const box = document.querySelector(`.labels[data-rid="${rid}"]`);
  const resp = await (await fetch(`/label/${rid}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      semester: box.querySelector('.lbl-sem').value,
      klass: box.querySelector('.lbl-class').value,
      unit:  box.querySelector('.lbl-unit').value,
      topic: box.querySelector('.lbl-topic').value,
      notes: box.querySelector('.lbl-notes').value,
    }),
  })).json();
  if (resp.error) alert(resp.error);
  refresh();
}

function progressBar(r) {
  const label = STAGE_LABEL[r.stage] || r.stage || 'working';
  const known = r.progress !== null && r.progress !== undefined;
  const fill = known ? `<div class="bar-fill" style="width:${r.progress}%"></div>` : '<div class="bar-fill indeterminate"></div>';
  return `<div class="progress"><div class="bar">${fill}</div><span class="progress-label">${esc(label)}${known ? ' — ' + r.progress + '%' : '…'}</span></div>`;
}

async function refresh() {
  // ponytail: don't blow away a label field the user is mid-edit on the 5s tick
  if (document.activeElement && document.getElementById('list').contains(document.activeElement)) return;
  const rows = await (await fetch('/recordings')).json();
  document.getElementById('list').innerHTML = rows.map(r => `
    <div class="rec">
      <b>${esc(r.title || '')}</b> <span class="status" data-s="${r.status}">${r.status}</span>${r.source && r.source !== 'local' ? ` <span class="src">via ${esc(r.source.replace('upload_audio', 'upload'))}</span>` : ''}<button class="del" title="Delete recording" onclick="deleteRec('${r.id}')">&#10005;</button>
      ${r.status === 'transcribing' ? progressBar(r) : ''}
      ${r.status === 'error' ? `<p class="error-msg">${esc(r.summary || 'Unknown error')}</p>` : ''}
      ${r.status === 'done' && !r.transcript ? '<p><em>No speech detected.</em></p>' : ''}
      ${r.status !== 'error' ? labelEditor(r) : ''}
      ${r.status === 'done' && r.summary ? `<h4>Summary</h4><pre>${esc(r.summary)}</pre>` : ''}
      ${r.source === 'syllabus' && r.status === 'done' ? `<p><a href="/assignments/${r.id}.ics">&#128197; Download due dates (.ics) — import into Google Calendar</a></p>` : ''}
      ${r.status === 'done' && (r.tokens_in || r.tokens_out) ? `<p class="tokens">${r.tokens_in || 0} in / ${r.tokens_out || 0} out tokens</p>` : ''}
      ${r.transcript ? `<details><summary>Transcript</summary><pre>${esc(r.transcript)}</pre></details>` : ''}
    </div>`).join('');
}

setInterval(refresh, 5000);
refresh();
</script>
</body>
</html>
